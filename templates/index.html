<!DOCTYPE html>
<html>
<head>
<title>{{ t.title }}</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:url("/static/test.png");
    background-size:cover;
    color:white;
}

.header{
    background:#2e7d32;
    padding:15px;
    font-size:22px;
    font-weight:bold;
    text-align:center;
}

/* MAIN FLEX LAYOUT */
.main{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:40px;
    margin-top:50px;
}

/* FORM BOX */
.card{
    background:rgba(0,0,0,0.8);
    width:340px;
    padding:25px;
    border-radius:12px;
}

input{
    width:95%;
    padding:9px;
    margin:6px;
    border-radius:6px;
    border:none;
}

button{
    padding:8px 12px;
    margin:5px;
    border-radius:6px;
    border:none;
    cursor:pointer;
}

.voice{background:#ff9800;color:white;}
.analyze{background:#4caf50;color:white;}
.history{background:#2196f3;color:white;}

/* IMPORTANT NOTE BOX */
.note-box{
    width:280px;
    background:rgba(0,0,0,0.85);
    padding:20px;
    border-radius:12px;
    border-left:5px solid #4CAF50;
}

.note-box h3{
    color:#4CAF50;
}

.lang{
    text-align:center;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header">{{ t.title }}</div>

<div class="lang">
<a href="/?lang=en">English</a> |
<a href="/?lang=ta">தமிழ்</a>
</div>


<div class="main">

<!-- FORM -->
<div class="card">

<form action="/analyze?lang={{ lang }}" method="post">

<input name="ph" placeholder="{{ t.ph }}">
<input name="moisture" placeholder="{{ t.moisture }}">
<input name="n" placeholder="{{ t.n }}">
<input name="p" placeholder="{{ t.p }}">
<input name="k" placeholder="{{ t.k }}">

<br>

<button type="button" class="voice" onclick="startVoice()">🎤 {{ t.voice }}</button>
<button type="submit" class="analyze">{{ t.analyze }}</button>

<a href="/history">
<button type="button" class="history">{{ t.history }}</button>
</a>

</form>

<br>
<p style="text-align:center;">Scan QR</p>
<img src="/static/qr-code.png" width="120" style="display:block; margin:auto;">

</div>


<!-- RIGHT SIDE IMPORTANT NOTE -->
<div class="note-box">
<h3>{{ t.note_title }}</h3>
<p>{{ t.note1 }}</p>
<p>{{ t.note2 }}</p>
<p>{{ t.note3 }}</p>
<p>{{ t.note4 }}</p>
</div>

</div>


<script>
function startVoice(){
 const SpeechRecognition =
  window.SpeechRecognition || window.webkitSpeechRecognition;

 const recognition = new SpeechRecognition();
 recognition.start();

 recognition.onresult = function(event){
   let parts = event.results[0][0].transcript.split(" ");
   if(parts.length>=5){
     document.getElementsByName("ph")[0].value=parts[0];
     document.getElementsByName("moisture")[0].value=parts[1];
     document.getElementsByName("n")[0].value=parts[2];
     document.getElementsByName("p")[0].value=parts[3];
     document.getElementsByName("k")[0].value=parts[4];
   }
 }
}
</script>

</body>
</html>
