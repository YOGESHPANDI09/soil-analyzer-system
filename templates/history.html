<!DOCTYPE html>
<html>
<head>
<title>Soil History</title>

<style>
body{
    font-family: Arial;
    background:#e8f5e9;
    margin:0;
}

/* header */
.header{
    background:#2e7d32;
    color:white;
    padding:15px;
    font-size:24px;
    font-weight:bold;
    text-align:center;
}

/* card */
.container{
    width:90%;
    max-width:1000px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* table */
table{
    width:100%;
    border-collapse:collapse;
}
th{
    background:#4caf50;
    color:white;
}
th,td{
    padding:10px;
    border:1px solid #ccc;
}
tr:nth-child(even){
    background:#f2f2f2;
}

/* soil section */
.soil-box{
    margin-top:20px;
    padding:15px;
    background:#f1f8e9;
    border-left:6px solid #4caf50;
    border-radius:8px;
}

.location{
    margin-top:15px;
    font-weight:bold;
    color:#2e7d32;
}

/* button */
.back{
    background:#2196f3;
    color:white;
    padding:10px 16px;
    border:none;
    border-radius:6px;
    margin-top:15px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
📜 Soil History & Location Soil Guide
</div>
<div style="text-align:center; margin-top:10px;">
    <a href="/location">
        <button class="back">🌍 Location Soil Guide</button>
    </a>
</div>

<div class="container">

<h3>📊 Previous Soil Analysis Records</h3>

<table>
<tr>
<th>ID</th>
<th>pH</th>
<th>Moisture</th>
<th>N</th>
<th>P</th>
<th>K</th>
<th>Soil</th>
<th>Crop</th>
</tr>

{% for row in data %}
<tr>
{% for col in row %}
<td>{{ col }}</td>
{% endfor %}
</tr>
{% endfor %}
</table>

<br><br>




<br>
<a href="/">
<button class="back">⬅ Back</button>
</a>

</div>

</body>
</html>
